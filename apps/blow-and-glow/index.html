<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blow & Glow · 烟</title>
<style>
  :root { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    cursor: none;
  }

  #smoke-canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Camera preview (small circle, bottom-right) */
  #cam-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15);
    opacity: 0.7;
    transition: opacity 0.6s, transform 0.3s;
    z-index: 10;
    background: #111;
  }
  #cam-container.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; }
  #cam-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  #cam-dot {
    position: absolute;
    width: 8px; height: 8px;
    background: #ff4444;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    box-shadow: 0 0 8px rgba(255,60,60,0.8);
    transition: left 0.05s linear, top 0.05s linear;
  }

  /* Mic + status bar */
  #status-bar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 8px 20px;
    backdrop-filter: blur(12px);
    transition: opacity 0.8s;
    font-size: 0.8rem;
    color: #888;
    letter-spacing: 0.06em;
  }
  #status-bar.fading { opacity: 0.2; }
  #blow-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #666;
    transition: background 0.15s, box-shadow 0.15s;
  }
  #blow-dot.active {
    background: #ff9944;
    box-shadow: 0 0 12px rgba(255,150,60,0.7);
  }

  /* Mouth indicator on smoke canvas (subtle ring) */
  #mouth-indicator {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.08);
    transform: translate(-50%, -50%);
    transition: left 0.08s ease-out, top 0.08s ease-out,
                border-color 0.3s, box-shadow 0.3s;
    display: none;
  }
  #mouth-indicator.visible { display: block; }
  #mouth-indicator.blowing {
    border-color: rgba(255,180,80,0.4);
    box-shadow: 0 0 30px rgba(255,150,40,0.15), inset 0 0 30px rgba(255,150,40,0.08);
  }

  /* Loading / permission prompt */
  #loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: radial-gradient(ellipse at center, #111 0%, #000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s, visibility 0.8s;
  }
  #loading-overlay.done {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #loading-overlay h1 {
    font-size: 3rem;
    font-weight: 300;
    background: linear-gradient(180deg, #ccc 0%, #555 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
  }
  #loading-overlay .sub {
    color: #666;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    margin-bottom: 3rem;
  }
  #loading-overlay .btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: #aaa;
    padding: 14px 36px;
    border-radius: 32px;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.08em;
    transition: all 0.3s;
  }
  #loading-overlay .btn:hover {
    border-color: rgba(255,255,255,0.35);
    color: #fff;
    background: rgba(255,255,255,0.1);
  }
  #loading-overlay .status-text {
    color: #555;
    font-size: 0.75rem;
    margin-top: 1.2rem;
    letter-spacing: 0.06em;
    min-height: 1.2em;
  }
</style>
</head>
<body>

<canvas id="smoke-canvas"></canvas>
<div id="mouth-indicator"></div>

<div id="cam-container" class="hidden">
  <video id="cam-video" playsinline autoplay></video>
  <div id="cam-dot"></div>
</div>

<div id="status-bar">
  <div id="blow-dot"></div>
  <span id="status-text">正在初始化…</span>
</div>

<div id="loading-overlay">
  <h1>烟</h1>
  <p class="sub">S M O K E</p>
  <button class="btn" id="start-btn">点 击 开 始</button>
  <p class="status-text" id="load-status"></p>
</div>

<!-- MediaPipe Face Mesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════════════════════════
// DOM refs
// ═══════════════════════════════════════════════════════════════
const smokeCanvas   = document.getElementById('smoke-canvas');
const ctx           = smokeCanvas.getContext('2d');
const mouthInd      = document.getElementById('mouth-indicator');
const camContainer  = document.getElementById('cam-container');
const camVideo      = document.getElementById('cam-video');
const camDot        = document.getElementById('cam-dot');
const statusBar     = document.getElementById('status-bar');
const blowDot       = document.getElementById('blow-dot');
const statusText    = document.getElementById('status-text');
const loadingOverlay = document.getElementById('loading-overlay');
const loadStatus    = document.getElementById('load-status');
const startBtn      = document.getElementById('start-btn');

// ═══════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════
let W, H;
let mouthX = -100, mouthY = -100;       // Screen-space mouth position
let targetMouthX = 0.5, targetMouthY = 0.4; // Normalized [0,1]
let mouthVisible = false;
let mouthConfidence = 0;
let blowIntensity = 0;
let smoothBlow = 0;
let audioReady = false;
let faceReady = false;
let particles = [];
let hudTimeout = null;

// Perlin-like noise state
const noisePerm = new Uint8Array(512);
{
  const p = new Uint8Array(256);
  for (let i = 0; i < 256; i++) p[i] = i;
  for (let i = 255; i > 0; i--) { const j = (Math.random() * (i+1))|0; [p[i],p[j]] = [p[j],p[i]]; }
  for (let i = 0; i < 512; i++) noisePerm[i] = p[i & 255];
}
function fade(t) { return t*t*t*(t*(t*6-15)+10); }
function lerp(a,b,t) { return a + t*(b-a); }
function grad(hash, x, y) {
  const h = hash & 3;
  return ((h&1) ? x : -x) + ((h&2) ? y : -y);
}
function noise2D(x, y) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
  const xf = x - Math.floor(x), yf = y - Math.floor(y);
  const u = fade(xf), v = fade(yf);
  const a = noisePerm[X] + Y, aa = noisePerm[a], ab = noisePerm[a+1];
  const b = noisePerm[X+1] + Y, ba = noisePerm[b], bb = noisePerm[b+1];
  return lerp(
    lerp(grad(noisePerm[aa], xf, yf), grad(noisePerm[ba], xf-1, yf), u),
    lerp(grad(noisePerm[ab], xf, yf-1), grad(noisePerm[bb], xf-1, yf-1), u),
    v
  );
}

// ═══════════════════════════════════════════════════════════════
// Smoke particle system
// ═══════════════════════════════════════════════════════════════
const PARTICLE_COUNT = 700;
const PARTICLE_LAYERS = 3;

// Pre-render soft circle texture
function createGlowTexture(size, innerAlpha) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const cx = c.getContext('2d');
  const g = cx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, `rgba(220,220,225,${innerAlpha})`);
  g.addColorStop(0.3, `rgba(200,200,210,${innerAlpha*0.7})`);
  g.addColorStop(0.6, `rgba(160,160,170,${innerAlpha*0.2})`);
  g.addColorStop(1, 'rgba(100,100,110,0)');
  cx.fillStyle = g;
  cx.fillRect(0, 0, size, size);
  return c;
}

const glowTex = createGlowTexture(256, 0.45);

function createParticle() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    size: 30 + Math.random() * 100,
    baseSize: 0,
    opacity: 0.04 + Math.random() * 0.14,
    vx: 0, vy: 0,
    life: Math.random(),       // phase offset
    layer: Math.floor(Math.random() * PARTICLE_LAYERS),
  };
}

function initParticles() {
  particles.length = 0;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = createParticle();
    p.baseSize = p.size;
    // Distribute so they cover the screen evenly
    p.x = Math.random() * W;
    p.y = Math.random() * H;
    particles.push(p);
  }
}

// ═══════════════════════════════════════════════════════════════
// Audio
// ═══════════════════════════════════════════════════════════════
let audioCtx = null, analyser = null, freqData = null, timeData = null;

async function initAudio() {
  if (audioReady) return true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.3;
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);
    audioReady = true;
    return true;
  } catch(e) {
    console.warn('Mic denied:', e);
    return false;
  }
}

function analyzeBlow() {
  if (!audioReady) return { intensity:0, isBlowing:false };
  analyser.getByteTimeDomainData(timeData);
  analyser.getByteFrequencyData(freqData);

  let sum = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    sum += v * v;
  }
  const rms = Math.sqrt(sum / timeData.length);

  // Spectral flatness (blow = noise-like)
  const low = freqData.slice(2, 64);
  let gMean = 0, aMean = 0;
  for (const v of low) { const vv = Math.max(v,1); gMean += Math.log(vv); aMean += vv; }
  gMean = Math.exp(gMean / low.length); aMean /= low.length;
  const flatness = aMean > 0 ? gMean / aMean : 0;

  const isBlowing = rms > 0.03 && flatness > 0.45;
  const intensity = isBlowing ? Math.min(1, (rms - 0.03) / 0.3) : 0;
  return { intensity, isBlowing };
}

// ═══════════════════════════════════════════════════════════════
// Face tracking
// ═══════════════════════════════════════════════════════════════
let faceMesh = null;

async function initFaceMesh() {
  if (faceReady) return true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: 'user' } });
    camVideo.srcObject = stream;
    await camVideo.play();

    faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${file}`
    });
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5,
    });

    faceMesh.onResults(onFaceResults);

    const cam = new Camera(camVideo, {
      onFrame: async () => { await faceMesh.send({ image: camVideo }); },
      width: 320, height: 240
    });
    cam.start();
    faceReady = true;
    camContainer.classList.remove('hidden');
    return true;
  } catch(e) {
    console.warn('Camera denied:', e);
    return false;
  }
}

function onFaceResults(results) {
  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    const lm = results.multiFaceLandmarks[0];
    // Lip landmarks: 13 (upper lip top center), 14 (lower lip bottom center)
    const upperLip = lm[13];
    const lowerLip = lm[14];
    const mouthCenter = {
      x: (upperLip.x + lowerLip.x) / 2,
      y: (upperLip.y + lowerLip.y) / 2,
    };

    // Mirror X (front camera), map to screen coords
    targetMouthX = 1 - mouthCenter.x;
    targetMouthY = mouthCenter.y;
    mouthVisible = true;

    // Update camera preview dot
    camDot.style.left = `${mouthCenter.x * 100}%`;
    camDot.style.top = `${mouthCenter.y * 100}%`;
  } else {
    mouthVisible = false;
  }
}

// ═══════════════════════════════════════════════════════════════
// Smoke update
// ═══════════════════════════════════════════════════════════════
function updateSmoke(dt) {
  dt = Math.min(dt, 0.05);

  // Smooth mouth position
  const smoothFactor = 0.15;
  mouthX += (targetMouthX * W - mouthX) * smoothFactor;
  mouthY += (targetMouthY * H - mouthY) * smoothFactor;

  // Per-particle update
  const blowRadius = 180; // Radius of blow effect around mouth
  const blowStrength = smoothBlow * 600;

  for (const p of particles) {
    const t = performance.now() * 0.0003 + p.life * 100;

    // Natural motion: slow upward drift + Perlin noise swirl
    const nx = noise2D(p.x * 0.008 + t * 0.3, p.y * 0.008) * 0.6;
    const ny = noise2D(p.x * 0.008 + t * 0.3 + 100, p.y * 0.008 + 100) * 0.5;
    const upDrift = -0.2 - p.layer * 0.08; // Higher layers rise slower (parallax)

    let fx = nx;
    let fy = ny + upDrift;

    // Blow force: push particles away from mouth
    if (smoothBlow > 0.02 && mouthVisible) {
      const dx = p.x - mouthX;
      const dy = p.y - mouthY;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < blowRadius) {
        // Force falls off with distance (Gaussian-ish)
        const force = Math.exp(-dist * dist / (blowRadius * blowRadius * 0.4)) * blowStrength;
        // Add slight randomness so it's not perfectly radial
        const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.4;
        fx += Math.cos(angle) * force;
        fy += Math.sin(angle) * force;
        // Turbulence near blow zone
        p.size = p.baseSize * (0.6 + Math.random() * 0.8);
      }
    }

    // Apply velocity with damping
    p.vx += fx * dt * 60;
    p.vy += fy * dt * 60;
    p.vx *= 0.96;
    p.vy *= 0.96;

    // Clamp velocity
    const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    const maxSpeed = 250;
    if (speed > maxSpeed) { p.vx = p.vx/speed*maxSpeed; p.vy = p.vy/speed*maxSpeed; }

    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Slowly return size to base
    p.size += (p.baseSize - p.size) * 2 * dt;

    // Wrap around edges with fade-in
    const margin = 60;
    if (p.x < -margin) p.x = W + margin;
    if (p.x > W + margin) p.x = -margin;
    if (p.y < -margin) p.y = H + margin;
    if (p.y > H + margin) p.y = -margin;
  }
}

// ═══════════════════════════════════════════════════════════════
// Smoke render
// ═══════════════════════════════════════════════════════════════
function renderSmoke() {
  ctx.clearRect(0, 0, W, H);

  // Dark background with subtle radial gradient
  const bgGrad = ctx.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, Math.max(W,H)*0.8);
  bgGrad.addColorStop(0, '#1a1a1c');
  bgGrad.addColorStop(1, '#050508');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Draw particles with additive blending
  ctx.globalCompositeOperation = 'lighter';

  // Sort by layer for depth effect (optional, draw order from back to front)
  // Just draw all — additive blending is order-independent-ish

  for (const p of particles) {
    const edgeFade = 1; // Particles wrap, no edge fade needed with wrap
    const alpha = p.opacity * edgeFade * 0.7;
    if (alpha < 0.005) continue;

    ctx.globalAlpha = alpha;
    const s = p.size * 2; // drawImage uses image dimensions, scale to desired size
    ctx.drawImage(glowTex, p.x - s/2, p.y - s/2, s, s);
  }

  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;

  // Subtle vignette
  const vignetteGrad = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.5, W/2, H/2, Math.max(W,H)*0.8);
  vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vignetteGrad;
  ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════════════
// Mouth indicator
// ═══════════════════════════════════════════════════════════════
function updateMouthIndicator() {
  if (mouthVisible) {
    mouthInd.classList.add('visible');
    mouthInd.style.left = mouthX + 'px';
    mouthInd.style.top = mouthY + 'px';
    if (smoothBlow > 0.05) {
      mouthInd.classList.add('blowing');
      // Scale up when blowing
      const scale = 1 + smoothBlow * 1.5;
      mouthInd.style.transform = `translate(-50%, -50%) scale(${scale})`;
    } else {
      mouthInd.classList.remove('blowing');
      mouthInd.style.transform = 'translate(-50%, -50%) scale(1)';
    }
  } else {
    mouthInd.classList.remove('visible', 'blowing');
  }
}

// ═══════════════════════════════════════════════════════════════
// Resize
// ═══════════════════════════════════════════════════════════════
function resize() {
  W = smokeCanvas.width = window.innerWidth;
  H = smokeCanvas.height = window.innerHeight;
  // Redistribute particles to cover new area
  if (particles.length > 0) {
    for (const p of particles) {
      p.x = Math.min(p.x, W);
      p.y = Math.min(p.y, H);
      p.baseSize = 20 + Math.random() * 110;
      p.size = p.baseSize;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// HUD auto-hide
// ═══════════════════════════════════════════════════════════════
function resetHud() {
  statusBar.classList.remove('fading');
  camContainer.classList.remove('hidden');
  clearTimeout(hudTimeout);
  hudTimeout = setTimeout(() => {
    statusBar.classList.add('fading');
    camContainer.classList.add('hidden');
    mouthInd.classList.remove('visible', 'blowing');
  }, 6000);
}

document.addEventListener('mousemove', resetHud);
document.addEventListener('touchstart', resetHud);

// ═══════════════════════════════════════════════════════════════
// Main loop
// ═══════════════════════════════════════════════════════════════
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  // Audio
  const blow = analyzeBlow();
  smoothBlow += (blow.intensity - smoothBlow) * 12 * Math.min(dt, 0.05);

  // Update status bar
  if (smoothBlow > 0.05) {
    blowDot.classList.add('active');
    statusText.textContent = '检测到吹气';
  } else {
    blowDot.classList.remove('active');
    if (!audioReady) statusText.textContent = '麦克风未就绪';
    else if (!faceReady) statusText.textContent = '摄像头未就绪';
    else if (!mouthVisible) statusText.textContent = '等待面部识别';
    else statusText.textContent = '对着屏幕吹气';
  }

  // Update smoke
  if (particles.length > 0) {
    updateSmoke(dt);
    renderSmoke();
    updateMouthIndicator();
  }
}

// ═══════════════════════════════════════════════════════════════
// Start
// ═══════════════════════════════════════════════════════════════
resize();
window.addEventListener('resize', resize);
animate();

async function start() {
  loadStatus.textContent = '正在请求麦克风…';
  const micOk = await initAudio();
  loadStatus.textContent = micOk ? '正在启动摄像头…' : '麦克风未授权，继续启动摄像头…';

  const camOk = await initFaceMesh();
  if (camOk) {
    loadStatus.textContent = '面部追踪已就绪';
  } else {
    loadStatus.textContent = '摄像头未授权，使用屏幕中心作为吹气目标';
    mouthVisible = false;
    targetMouthX = 0.5; targetMouthY = 0.4;
  }

  initParticles();
  loadingOverlay.classList.add('done');
  resetHud();

  if (!micOk && !camOk) {
    statusText.textContent = '请授权麦克风或摄像头后刷新页面';
  }
}

startBtn.addEventListener('click', start);

// Allow keyboard 'm' to retry mic
window.addEventListener('keydown', async e => {
  if (e.key === 'm' && !audioReady) { await initAudio(); }
  if (e.key === 'c' && !faceReady) { await initFaceMesh(); }
  resetHud();
});

console.log('💨 Blow & Glow — 烟 Smoke');
console.log('   Blow on the screen — smoke scatters from your mouth position.');
console.log('   Camera tracks your mouth. Mic detects blowing.');
</script>
</body>
</html>
