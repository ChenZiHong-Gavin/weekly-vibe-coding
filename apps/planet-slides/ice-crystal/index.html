<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>冰晶极地 — Planet Slide</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:wght@100;200;300;400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2848; }
.scene-3d { position: relative; width: 100%; height: 100%; overflow: hidden; user-select: none; font-family: "Raleway","PingFang SC","Microsoft YaHei",sans-serif; }
.scene-3d canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
.frost-vignette { position: absolute; inset: 0; z-index: 3; pointer-events: none; background: radial-gradient(ellipse at center, transparent 40%, rgba(10,15,35,0.5) 85%, rgba(5,10,25,0.7) 100%); }
.title-block { position: absolute; top: 50%; left: 6%; transform: translateY(-50%); z-index: 10; text-align: left; pointer-events: none; max-width: 42%; }
.title-block h1 { font-size: clamp(3rem, 7vw, 6rem); font-weight: 100; margin: 0; letter-spacing: 0.08em; line-height: 1.1; color: rgba(200,220,255,0.9); text-shadow: 0 0 40px rgba(130,170,230,0.5), 0 2px 4px rgba(0,0,0,0.3); }
.title-block .subtitle { margin-top: 0.8rem; font-size: clamp(1.2rem, 2.2vw, 1.8rem); color: rgba(160,200,240,0.6); letter-spacing: 0.15em; font-weight: 200; }
.title-block .meta { margin-top: 2rem; font-size: clamp(1rem, 1.6vw, 1.3rem); color: rgba(140,180,220,0.5); letter-spacing: 0.08em; font-weight: 200; }
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>
</head>
<body>
<div class="scene-3d" id="scene3d">
  <div class="frost-vignette"></div>
  <div class="title-block">
    <h1>冰晶极地</h1>
    <p class="subtitle">极光与冰原半星球</p>
    <div class="meta"><span>Style #8</span></div>
  </div>
</div>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const container = document.getElementById('scene3d');
let W = container.clientWidth, H = container.clientHeight;

const scene = new THREE.Scene();
const bgC = document.createElement('canvas'); bgC.width=2; bgC.height=512; const bgCtx=bgC.getContext('2d');
const grad=bgCtx.createLinearGradient(0,0,0,512);
grad.addColorStop(0,'#1a2a4a'); grad.addColorStop(0.3,'#1e3058'); grad.addColorStop(0.6,'#243860'); grad.addColorStop(1,'#1a2848');
bgCtx.fillStyle=grad; bgCtx.fillRect(0,0,2,512); scene.background=new THREE.CanvasTexture(bgC);
scene.fog = new THREE.Fog('#1a2848', 200, 900);

const camera = new THREE.PerspectiveCamera(45, W/H, 1, 2000);
camera.position.set(0, 45, 340); camera.lookAt(0, 25, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H); renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.0;
container.insertBefore(renderer.domElement, container.firstChild);

scene.add(new THREE.AmbientLight(0x334466, 0.3));
const mL = new THREE.DirectionalLight(0xaaccff, 1.0); mL.position.set(100, 200, 250); scene.add(mL);
const iL1 = new THREE.DirectionalLight(0x6688cc, 0.4); iL1.position.set(-100, -30, -100); scene.add(iL1);
const iL2 = new THREE.PointLight(0x6699dd, 40, 250); iL2.position.set(0, 60, 80); scene.add(iL2);

// ── Half-sphere ice ground ──
const groundGeo = new THREE.SphereGeometry(300, 64, 32, 0, Math.PI*2, 0, Math.PI/2);
const gPos = groundGeo.attributes.position; const gCol = new Float32Array(gPos.count*3);
for (let i = 0; i < gPos.count; i++) {
  const y=gPos.getY(i); const r=Math.sqrt(gPos.getX(i)**2+gPos.getZ(i)**2);
  const shade=0.75+(y/300)*0.15+Math.sin(r*0.05)*0.05;
  gCol[i*3]=0.45*shade; gCol[i*3+1]=0.55*shade; gCol[i*3+2]=0.75*shade;
}
groundGeo.setAttribute('color', new THREE.BufferAttribute(gCol, 3));
const ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.15, metalness: 0.05, flatShading: true }));
ground.position.set(0, -293, 0); scene.add(ground);

// ── Faceted ice planet ──
const planet = new THREE.Group(); planet.position.set(0, 50, -30);
const pGeo = new THREE.IcosahedronGeometry(24, 2);
const pPos = pGeo.attributes.position; const pCol = [];
for (let i = 0; i < pPos.count; i++) {
  const x=pPos.getX(i),y=pPos.getY(i),z=pPos.getZ(i),r=Math.sqrt(x*x+y*y+z*z);
  pCol.push(0.45+(y/r)*0.25,0.55+(y/r)*0.2,0.75+(y/r)*0.15);
}
pGeo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(pCol), 3));
planet.add(new THREE.Mesh(pGeo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.1, metalness: 0.05, flatShading: true })));
// Crystalline rings
for (let i = 0; i < 2; i++) {
  const rGeo = new THREE.TorusGeometry(30+i*5, 0.4+i*0.3, 8, 100);
  const rPos = rGeo.attributes.position;
  for (let j = 0; j < rPos.count; j++) { const x=rPos.getX(j),y=rPos.getY(j); const dist=Math.sqrt(x*x+y*y); if(dist>0)rPos.setZ(j,rPos.getZ(j)+Math.sin(Math.atan2(y,x)*8)*1.2); }
  rGeo.computeVertexNormals();
  const rMat = new THREE.MeshStandardMaterial({ color: [0xd0e4ff, 0xe0eeff][i], roughness: 0.2, metalness: 0.1, side: THREE.DoubleSide, transparent: true, opacity: 0.5-i*0.15 });
  const ring = new THREE.Mesh(rGeo, rMat); ring.rotation.x = Math.PI*0.55+i*0.1; ring.rotation.y = i*0.2; planet.add(ring);
}
scene.add(planet);

// ── Aurora ribbons ──
const auroraGroup = new THREE.Group(); auroraGroup.position.set(-100, 110, -210);
function makeAurora(points, thickness, baseHue, opacity) {
  const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
  const geo = new THREE.TubeGeometry(curve, 80, thickness, 8, false);
  const pos = geo.attributes.position; const cols = [];
  for (let i = 0; i < pos.count; i++) {
    const frac = i/pos.count;
    const c = new THREE.Color().setHSL((baseHue+Math.sin(frac*Math.PI*3)*0.15)%1, 0.7, 0.5+Math.sin(frac*Math.PI*2)*0.2);
    cols.push(c.r, c.g, c.b);
  }
  geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(cols), 3));
  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false }));
  mesh.userData = { baseOpacity: opacity };
  return mesh;
}
const a1 = makeAurora([new THREE.Vector3(-80,0,0),new THREE.Vector3(-40,20,10),new THREE.Vector3(0,15,-5),new THREE.Vector3(40,25,8),new THREE.Vector3(80,5,-3),new THREE.Vector3(120,18,6)], 3, 0.55, 0.35);
const a2 = makeAurora([new THREE.Vector3(-60,-10,5),new THREE.Vector3(-20,29,-5),new THREE.Vector3(20,20,10),new THREE.Vector3(60,30,-8),new THREE.Vector3(100,8,4),new THREE.Vector3(140,22,-3)], 5, 0.6, 0.2);
auroraGroup.add(a1); auroraGroup.add(a2); scene.add(auroraGroup);

// ── Snow particles ──
const snowGeo = new THREE.BufferGeometry(); const sn=500; const sPos=new Float32Array(sn*3);
for (let i = 0; i < sn; i++) { sPos[i*3]=(Math.random()-0.5)*600; sPos[i*3+1]=-50+Math.random()*190; sPos[i*3+2]=-100-Math.random()*200; }
snowGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
const snowC = document.createElement('canvas'); snowC.width=8; snowC.height=8; const sctx=snowC.getContext('2d'); sctx.fillStyle='rgba(255,255,255,0.8)'; sctx.beginPath(); sctx.arc(4,4,3,0,Math.PI*2); sctx.fill();
const snow = new THREE.Points(snowGeo, new THREE.PointsMaterial({ map: new THREE.CanvasTexture(snowC), size: 2.5, transparent: true, depthWrite: false, opacity: 0.7 }));
scene.add(snow);

// ── Ice crystals on ground ──
for (let i = 0; i < 20; i++) {
  const cx=(Math.random()-0.5)*260, cz=(Math.random()-0.5)*190;
  const sy=Math.sqrt(Math.max(0,300*300-cx*cx-cz*cz))-293;
  if(sy<-5)continue;
  const h=4+Math.random()*14;
  const geo = new THREE.ConeGeometry(2, h, 6); geo.scale(1, 1, 0.6+Math.random()*0.4);
  const crystal = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0xaaccdd, roughness: 0.15, emissive: 0x4466aa, emissiveIntensity: 0.4 }));
  crystal.position.set(cx, sy+h/2, cz); scene.add(crystal);
}

// ── Post ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 0.6, 0.5, 0.85));

// ── Drag orbit ──
let isDragging=false,pmx=0,pmy=0,orbitH=0,orbitHt=0,orbitV=0.35,orbitVt=0.35;
const OC=new THREE.Vector3(0,28,0),OR=340;
container.addEventListener('mousedown',e=>{isDragging=true;pmx=e.clientX;pmy=e.clientY;});
window.addEventListener('mousemove',e=>{if(isDragging){orbitHt-=(e.clientX-pmx)*0.004;orbitVt-=(e.clientY-pmy)*0.003;orbitVt=Math.max(0.05,Math.min(0.65,orbitVt));pmx=e.clientX;pmy=e.clientY;}});
window.addEventListener('mouseup',()=>{isDragging=false;});
container.addEventListener('touchstart',e=>{if(e.touches.length===1){isDragging=true;pmx=e.touches[0].clientX;pmy=e.touches[0].clientY;}});
window.addEventListener('touchmove',e=>{if(isDragging&&e.touches.length===1){orbitHt-=(e.touches[0].clientX-pmx)*0.004;orbitVt-=(e.touches[0].clientY-pmy)*0.003;orbitVt=Math.max(0.05,Math.min(0.65,orbitVt));pmx=e.touches[0].clientX;pmy=e.touches[0].clientY;}});
window.addEventListener('touchend',()=>{isDragging=false;});

const keys={};window.addEventListener('keydown',e=>{keys[e.key]=true;});window.addEventListener('keyup',e=>{keys[e.key]=false;});
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  if(keys['a']||keys['A'])orbitHt-=0.02;if(keys['d']||keys['D'])orbitHt+=0.02;if(keys['w']||keys['W'])orbitVt-=0.012;if(keys['s']||keys['S'])orbitVt+=0.012;orbitVt=Math.max(0.05,Math.min(0.65,orbitVt));
  orbitH+=(orbitHt-orbitH)*0.1; orbitV+=(orbitVt-orbitV)*0.1;
  const ya=orbitV*Math.PI*0.5;
  camera.position.x=OC.x+Math.sin(orbitH)*Math.cos(ya)*OR;
  camera.position.z=OC.z+Math.cos(orbitH)*Math.cos(ya)*OR;
  camera.position.y=OC.y+Math.sin(ya)*OR;
  camera.lookAt(OC);

  planet.rotation.y+=0.002; planet.rotation.x=Math.sin(t*0.2)*0.03;

  // Aurora animation
  auroraGroup.position.x = -100+Math.sin(t*0.3)*15;
  auroraGroup.rotation.z = Math.sin(t*0.25)*0.04;
  a1.material.opacity = a1.userData.baseOpacity + Math.sin(t*0.5)*0.1;
  a2.material.opacity = a2.userData.baseOpacity + Math.cos(t*0.7)*0.06;

  // Snow
  const sPosA = snow.geometry.attributes.position;
  for (let i = 0; i < Math.min(sn, sPosA.count); i++) {
    let y = sPosA.getY(i) - 0.25;
    if (y < -70) y = 120+Math.random()*30;
    sPosA.setY(i, y); sPosA.setX(i, sPosA.getX(i)+Math.sin(t*0.5+i*0.1)*0.08);
  }
  snow.geometry.attributes.position.needsUpdate = true;

  iL2.intensity = 30+Math.sin(t*0.6)*8;

  composer.render();
}
animate();

window.addEventListener('resize',()=>{W=container.clientWidth;H=container.clientHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);composer.setSize(W,H);});
</script>
</body>
</html>
