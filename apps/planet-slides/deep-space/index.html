<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>深空探索 — Planet Slide</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000011; }
.scene-3d { position: relative; width: 100%; height: 100%; overflow: hidden; user-select: none; font-family: "Space Grotesk","PingFang SC","Microsoft YaHei",system-ui,sans-serif; }
.scene-3d canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
.vignette { position: absolute; inset: 0; z-index: 3; pointer-events: none; background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,20,0.5) 100%); }
.title-block { position: absolute; bottom: 15%; left: 6%; z-index: 10; text-align: left; pointer-events: none; max-width: 45%; }
.title-block h1 { font-size: clamp(2.8rem, 6vw, 5.5rem); font-weight: 700; margin: 0; letter-spacing: 0.04em; line-height: 1.1; color: #e8e8ff; text-shadow: 0 0 60px rgba(150,180,255,0.4), 0 2px 4px rgba(0,0,0,0.6); }
.title-block .subtitle { margin-top: 0.8rem; font-size: clamp(1.2rem, 2.2vw, 1.8rem); color: rgba(180,200,255,0.6); letter-spacing: 0.12em; font-weight: 300; }
.title-block .meta { margin-top: 2rem; font-size: clamp(1rem, 1.6vw, 1.3rem); color: rgba(150,170,220,0.5); letter-spacing: 0.06em; font-weight: 400; }
</style>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>
</head>
<body>
<div class="scene-3d" id="scene3d">
  <div class="vignette"></div>
  <div class="title-block">
    <h1>深空探索</h1>
    <p class="subtitle">站在小行星上看巨行星</p>
    <div class="meta"><span>Style #3</span></div>
  </div>
</div>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const container = document.getElementById('scene3d');
let W = container.clientWidth, H = container.clientHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#000011');

const camera = new THREE.PerspectiveCamera(50, W / H, 1, 3000);
camera.position.set(0, 45, 340); camera.lookAt(0, 25, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H); renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.3;
container.insertBefore(renderer.domElement, container.firstChild);

scene.add(new THREE.AmbientLight(0x111133, 0.4));
const starLight = new THREE.DirectionalLight(0xccddff, 2.5); starLight.position.set(200, 150, 300); scene.add(starLight);
const rimLight = new THREE.DirectionalLight(0x3355aa, 1.0); rimLight.position.set(-200, -50, -200); scene.add(rimLight);

// ── Starfield ──
const starsGeo = new THREE.BufferGeometry();
const sc = 2500; const sp = new Float32Array(sc*3); const scol = new Float32Array(sc*3);
for (let i = 0; i < sc; i++) {
  const theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1), r = 700+Math.random()*800;
  sp[i*3]=Math.sin(phi)*Math.cos(theta)*r; sp[i*3+1]=Math.sin(phi)*Math.sin(theta)*r*0.6; sp[i*3+2]=-100-Math.random()*400-Math.cos(phi)*r*0.5;
  const temp=Math.random();
  if(temp<0.1){scol[i*3]=0.6;scol[i*3+1]=0.7;scol[i*3+2]=1.0;}else if(temp<0.3){scol[i*3]=1;scol[i*3+1]=1;scol[i*3+2]=1;}else if(temp<0.5){scol[i*3]=1;scol[i*3+1]=0.9;scol[i*3+2]=0.7;}else{scol[i*3]=0.5;scol[i*3+1]=0.6;scol[i*3+2]=1;}
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
starsGeo.setAttribute('color', new THREE.BufferAttribute(scol, 3));
const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ size: 0.8, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
scene.add(stars);

// ── Nebula sprites ──
const nebulaGroup = new THREE.Group();
for (let i = 0; i < 5; i++) {
  const nebC = document.createElement('canvas'); nebC.width=128; nebC.height=128;
  const ctx=nebC.getContext('2d'); const ng=ctx.createRadialGradient(64,64,0,64,64,64);
  const hue=[260,200,340,30,180][i];
  ng.addColorStop(0,`hsla(${hue},60%,60%,0.12)`); ng.addColorStop(0.5,`hsla(${hue},50%,50%,0.05)`); ng.addColorStop(1,'transparent');
  ctx.fillStyle=ng; ctx.fillRect(0,0,128,128);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(nebC), blending: THREE.AdditiveBlending, transparent: true, depthWrite: false }));
  s.scale.set(250+Math.random()*350, 180+Math.random()*250, 1);
  s.position.set((Math.random()-0.5)*500, (Math.random()-0.5)*250, -200-Math.random()*200);
  nebulaGroup.add(s);
}
scene.add(nebulaGroup);

// ── Giant ringed planet in the sky ──
const giantPlanet = new THREE.Group(); giantPlanet.position.set(-60, 120, -200);
const gpGeo = new THREE.SphereGeometry(50, 64, 48);
const gpColors = new Float32Array(gpGeo.attributes.position.count*3);
const gpPos = gpGeo.attributes.position;
for (let i = 0; i < gpPos.count; i++) {
  const x=gpPos.getX(i), y=gpPos.getY(i), z=gpPos.getZ(i);
  const n = Math.sin(x*0.3)*Math.cos(z*0.3)*Math.sin(y*0.2)*0.3+0.7;
  gpColors[i*3]=0.4*n; gpColors[i*3+1]=0.55*n; gpColors[i*3+2]=0.8*n;
}
gpGeo.setAttribute('color', new THREE.BufferAttribute(gpColors, 3));
giantPlanet.add(new THREE.Mesh(gpGeo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.5, metalness: 0.1 })));
for (let r = 0; r < 3; r++) {
  const rg = new THREE.TorusGeometry(56+r*8, 1.5+r*0.8, 16, 128);
  const ring = new THREE.Mesh(rg, new THREE.MeshStandardMaterial({ color: [0x8899cc,0xaabbdd,0x7788bb][r], roughness: 0.3, metalness: 0.2, side: THREE.DoubleSide, transparent: true, opacity: 0.7-r*0.15 }));
  ring.rotation.x = Math.PI*0.42+r*0.08; giantPlanet.add(ring);
}
scene.add(giantPlanet);

// ── Half-sphere asteroid surface (foreground) ──
const asteroidGeo = new THREE.SphereGeometry(280, 48, 24, 0, Math.PI*2, 0, Math.PI/2);
const aPos = asteroidGeo.attributes.position;
const aColors = new Float32Array(aPos.count*3);
for (let i = 0; i < aPos.count; i++) {
  const y=aPos.getY(i); const shade=0.25+Math.random()*0.15+(y/280)*0.1;
  aColors[i*3]=0.35*shade; aColors[i*3+1]=0.32*shade; aColors[i*3+2]=0.38*shade;
}
asteroidGeo.setAttribute('color', new THREE.BufferAttribute(aColors, 3));
const asteroid = new THREE.Mesh(asteroidGeo, new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.8, metalness: 0.05 }));
asteroid.position.set(0, -273, 0); scene.add(asteroid);

// Rocks on asteroid surface
for (let i = 0; i < 30; i++) {
  const rx=(Math.random()-0.5)*260, rz=(Math.random()-0.5)*200;
  const sy=Math.sqrt(Math.max(0,280*280-rx*rx-rz*rz))-273;
  if(sy<-5)continue;
  const size=2+Math.random()*6;
  const rockGeo=new THREE.IcosahedronGeometry(size,0);
  const rp=rockGeo.attributes.position;
  for(let j=0;j<rp.count;j++){rp.setX(j,rp.getX(j)+(Math.random()-0.5)*size*0.5);rp.setY(j,rp.getY(j)+(Math.random()-0.5)*size*0.4);rp.setZ(j,rp.getZ(j)+(Math.random()-0.5)*size*0.5);}
  rockGeo.computeVertexNormals();
  const rock=new THREE.Mesh(rockGeo,new THREE.MeshStandardMaterial({color:[0x555566,0x4a4a5a,0x606070][Math.floor(Math.random()*3)],roughness:0.7}));
  rock.position.set(rx,sy,rz); scene.add(rock);
}

// ── Post ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 0.6, 0.7, 0.8));

// ── Drag orbit ──
let isDragging=false,pmx=0,pmy=0,orbitH=0,orbitHt=0,orbitV=0.35,orbitVt=0.35;
const OC=new THREE.Vector3(0,30,0),OR=340;
container.addEventListener('mousedown',e=>{isDragging=true;pmx=e.clientX;pmy=e.clientY;});
window.addEventListener('mousemove',e=>{if(isDragging){orbitHt-=(e.clientX-pmx)*0.004;orbitVt-=(e.clientY-pmy)*0.003;orbitVt=Math.max(0.05,Math.min(0.65,orbitVt));pmx=e.clientX;pmy=e.clientY;}});
window.addEventListener('mouseup',()=>{isDragging=false;});
container.addEventListener('touchstart',e=>{if(e.touches.length===1){isDragging=true;pmx=e.touches[0].clientX;pmy=e.touches[0].clientY;}});
window.addEventListener('touchmove',e=>{if(isDragging&&e.touches.length===1){orbitHt-=(e.touches[0].clientX-pmx)*0.004;orbitVt-=(e.touches[0].clientY-pmy)*0.003;orbitVt=Math.max(0.05,Math.min(0.65,orbitVt));pmx=e.touches[0].clientX;pmy=e.touches[0].clientY;}});
window.addEventListener('touchend',()=>{isDragging=false;});

const keys={};window.addEventListener('keydown',e=>{keys[e.key]=true;});window.addEventListener('keyup',e=>{keys[e.key]=false;});
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  if(keys['a']||keys['A'])orbitHt-=0.02;if(keys['d']||keys['D'])orbitHt+=0.02;if(keys['w']||keys['W'])orbitVt-=0.012;if(keys['s']||keys['S'])orbitVt+=0.012;orbitVt=Math.max(0.05,Math.min(0.65,orbitVt));
  orbitH+=(orbitHt-orbitH)*0.1; orbitV+=(orbitVt-orbitV)*0.1;
  const ya=orbitV*Math.PI*0.5;
  camera.position.x=OC.x+Math.sin(orbitH)*Math.cos(ya)*OR;
  camera.position.z=OC.z+Math.cos(orbitH)*Math.cos(ya)*OR;
  camera.position.y=OC.y+Math.sin(ya)*OR;
  camera.lookAt(OC);

  giantPlanet.rotation.y+=0.002;
  giantPlanet.rotation.x=Math.sin(t*0.2)*0.05;
  stars.rotation.y+=0.0003;
  nebulaGroup.rotation.y+=0.0002;

  composer.render();
}
animate();

window.addEventListener('resize',()=>{W=container.clientWidth;H=container.clientHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);composer.setSize(W,H);});
</script>
</body>
</html>
