          key: air-drum-master-dist-${{ hashFiles('apps/air-drum-master/src/**', 'apps/air-drum-master/public/**', 'apps/air-drum-master/index.html', 'apps/air-drum-master/vite.config.*', 'apps/air-drum-master/tsconfig*.json', 'apps/air-drum-master/package-lock.json') }}

