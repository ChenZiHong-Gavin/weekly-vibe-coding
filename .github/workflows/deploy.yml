      # louis-xvi-sort
      # ═══════════════════════════════════════════════════════════════
      - name: Cache louis-xvi-sort node_modules
        id: nm-louis-xvi-sort
        uses: actions/cache@v4
        with:
          path: apps/louis-xvi-sort/node_modules
          key: louis-xvi-sort-nm-${{ hashFiles('apps/louis-xvi-sort/package-lock.json') }}

      - name: Cache louis-xvi-sort dist
        id: dist-louis-xvi-sort
        uses: actions/cache@v4
        with:
          path: apps/louis-xvi-sort/dist
          key: louis-xvi-sort-dist-${{ hashFiles('apps/louis-xvi-sort/src/**', 'apps/louis-xvi-sort/public/**', 'apps/louis-xvi-sort/index.html', 'apps/louis-xvi-sort/vite.config.*', 'apps/louis-xvi-sort/tsconfig*.json', 'apps/louis-xvi-sort/package-lock.json') }}

