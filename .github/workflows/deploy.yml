        id: dist-shadow-puppet
        uses: actions/cache@v4
        with:
          path: apps/shadow-puppet/dist
          key: shadow-puppet-dist-${{ hashFiles('apps/shadow-puppet/src/**', 'apps/shadow-puppet/public/**', 'apps/shadow-puppet/index.html', 'apps/shadow-puppet/vite.config.*', 'apps/shadow-puppet/tsconfig*.json', 'apps/shadow-puppet/package-lock.json') }}

      - name: Build shadow-puppet
        if: steps.dist-shadow-puppet.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          cd apps/shadow-puppet
          if [ "${{ steps.nm-shadow-puppet.outputs.cache-hit }}" = "true" ]; then
            npm run build
          else
            npm ci && npm run build
          fi

      # ═══════════════════════════════════════════════════════════════
      # Assemble all builds into dist/
      # ═══════════════════════════════════════════════════════════════
      - name: Assemble dist
        run: |
          mkdir -p dist/{dice-verse,spin-art,snap-puzzle,danmaku-magic,hairline-tracker,peking-opera,air-drum-master,pi-matchmaker,prompt-playground,arxiv-to-novel,vim-chaser,louis-xvi-sort,pretext-solar-system,real-to-ai,marionette,planet-slides,shadow-puppet,walk-the-dog,blow-and-glow}

          # Built projects — copy dist/
          cp -r apps/dice-verse/dist/*         dist/dice-verse/        2>/dev/null || true
          cp -r apps/spin-art/dist/*           dist/spin-art/          2>/dev/null || true
          cp -r apps/snap-puzzle/dist/*        dist/snap-puzzle/       2>/dev/null || true
          cp -r apps/danmaku-magic/dist/*      dist/danmaku-magic/     2>/dev/null || true
          cp -r apps/hairline-tracker/dist/*   dist/hairline-tracker/  2>/dev/null || true
          cp -r apps/peking-opera/dist/*       dist/peking-opera/      2>/dev/null || true
          cp -r apps/air-drum-master/dist/*    dist/air-drum-master/   2>/dev/null || true
          cp -r apps/pi-matchmaker/dist/*      dist/pi-matchmaker/     2>/dev/null || true
          cp -r apps/prompt-playground/dist/*  dist/prompt-playground/ 2>/dev/null || true
          cp -r apps/vim-chaser/dist/*         dist/vim-chaser/        2>/dev/null || true
          cp -r apps/louis-xvi-sort/dist/*     dist/louis-xvi-sort/    2>/dev/null || true
          cp -r apps/pretext-solar-system/dist/* dist/pretext-solar-system/ 2>/dev/null || true
          cp -r apps/real-to-ai/dist/*         dist/real-to-ai/        2>/dev/null || true
          cp -r apps/shadow-puppet/dist/*      dist/shadow-puppet/     2>/dev/null || true

          # Static projects — copy source files
          cp apps/walk-the-dog/index.html      dist/walk-the-dog/
          cp apps/blow-and-glow/index.html     dist/blow-and-glow/
          cp apps/marionette/index.html        dist/marionette/
          cp -r apps/planet-slides/*           dist/planet-slides/
          cp apps/arxiv-to-novel/index.html apps/arxiv-to-novel/style.css apps/arxiv-to-novel/app.js apps/arxiv-to-novel/demo-novel.js dist/arxiv-to-novel/

          # prompt-playground also serves as site root
          cp -r apps/prompt-playground/dist/*  dist/ 2>/dev/null || true

          echo "=== dist structure ==="
          find dist -maxdepth 2 -type d | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: deployment
        uses: actions/deploy-pages@v4
