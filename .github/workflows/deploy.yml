      # ═══════════════════════════════════════════════════════════════
      # pretext-solar-system
      # ═══════════════════════════════════════════════════════════════
      - name: Cache pretext-solar-system node_modules
        id: nm-pretext-solar-system
        uses: actions/cache@v4
        with:
          path: apps/pretext-solar-system/node_modules
          key: pretext-solar-system-nm-${{ hashFiles('apps/pretext-solar-system/package-lock.json') }}

      - name: Cache pretext-solar-system dist
        id: dist-pretext-solar-system
        uses: actions/cache@v4
        with:
          path: apps/pretext-solar-system/dist
          key: pretext-solar-system-dist-${{ hashFiles('apps/pretext-solar-system/src/**', 'apps/pretext-solar-system/public/**', 'apps/pretext-solar-system/index.html', 'apps/pretext-solar-system/vite.config.*', 'apps/pretext-solar-system/tsconfig*.json', 'apps/pretext-solar-system/package-lock.json') }}

      - name: Build pretext-solar-system
