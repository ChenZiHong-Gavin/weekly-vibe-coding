name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'apps/dice-verse/package-lock.json'
        
    - name: Install dice-verse dependencies
      run: |
        cd apps/dice-verse
        npm install
        
    - name: Build dice-verse
      env:
        VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
        VITE_LLM_API_URL: ${{ secrets.VITE_LLM_API_URL }}
        VITE_LLM_MODEL: ${{ secrets.VITE_LLM_MODEL }}
      run: |
        cd apps/dice-verse
        npm run build

    - name: Install spin-art dependencies
      run: |
        cd apps/spin-art
        npm install

    - name: Build spin-art
      run: |
        cd apps/spin-art
        npm run build

    - name: Install snap-puzzle dependencies
      run: |
        cd apps/snap-puzzle
        npm install

    - name: Build snap-puzzle
      run: |
        cd apps/snap-puzzle
        npm run build
    
    - name: Install danmaku-magic dependencies
      run: |
        cd apps/danmaku-magic
        npm install
    
    - name: Build danmaku-magic
      run: |
        cd apps/danmaku-magic
        npm run build

    - name: Install hairline-tracker dependencies
      run: |
        cd apps/hairline-tracker
        npm install
    
    - name: Build hairline-tracker
      run: |
        cd apps/hairline-tracker
        npm run build

    - name: Install peking-opera dependencies
      run: |
        cd apps/peking-opera
        npm install
    
    - name: Build peking-opera
      run: |
        cd apps/peking-opera
        npm run build

    - name: Install pi-matchmaker dependencies
      run: |
        cd apps/pi-matchmaker
        npm install

    - name: Build pi-matchmaker
      run: |
        cd apps/pi-matchmaker
        npm run build
    
        
    - name: Install air-drum-master dependencies
      run: |
        cd apps/air-drum-master
        npm install
    
    - name: Build air-drum-master
      run: |
        cd apps/air-drum-master
        npm run build

    - name: Install prompt-playground dependencies
      run: |
        cd apps/prompt-playground
        npm install
    
    - name: Build prompt-playground
      run: |
        cd apps/prompt-playground
        npm run build

    - name: Install vim-chaser dependencies
      run: |
        cd apps/vim-chaser
        npm install

    - name: Build vim-chaser
      run: |
        cd apps/vim-chaser
        npm run build

    - name: Install louis-xvi-sort dependencies
      run: |
        cd apps/louis-xvi-sort
        npm install

    - name: Build louis-xvi-sort
      run: |
        cd apps/louis-xvi-sort
        npm run build

    - name: Install pretext-solar-system dependencies
      run: |
        cd apps/pretext-solar-system
        npm install

    - name: Build pretext-solar-system
      run: |
        cd apps/pretext-solar-system
        npm run build

    - name: Install real-to-ai dependencies
      run: |
        cd apps/real-to-ai
        npm install

    - name: Build real-to-ai
      run: |
        cd apps/real-to-ai
        npm run build

    - name: Copy all builds to dist
      run: |
        mkdir -p dist/{dice-verse,spin-art,snap-puzzle,danmaku-magic,hairline-tracker,peking-opera,air-drum-master,pi-matchmaker,prompt-playground,arxiv-to-novel,vim-chaser,louis-xvi-sort,pretext-solar-system,real-to-ai}
        cp -r apps/dice-verse/dist/* dist/dice-verse/
        cp -r apps/spin-art/dist/* dist/spin-art/
        cp -r apps/snap-puzzle/dist/* dist/snap-puzzle/
        cp -r apps/danmaku-magic/dist/* dist/danmaku-magic/
        cp -r apps/hairline-tracker/dist/* dist/hairline-tracker/
        cp -r apps/peking-opera/dist/* dist/peking-opera/
        cp -r apps/air-drum-master/dist/* dist/air-drum-master/
        cp -r apps/pi-matchmaker/dist/* dist/pi-matchmaker/
        cp -r apps/prompt-playground/dist/* dist/prompt-playground/
        cp -r apps/prompt-playground/dist/* dist/
        cp -r apps/vim-chaser/dist/* dist/vim-chaser/
        cp apps/arxiv-to-novel/index.html apps/arxiv-to-novel/style.css apps/arxiv-to-novel/app.js apps/arxiv-to-novel/demo-novel.js dist/arxiv-to-novel/
        cp -r apps/louis-xvi-sort/dist/* dist/louis-xvi-sort/
        cp -r apps/pretext-solar-system/dist/* dist/pretext-solar-system/
        cp -r apps/real-to-ai/dist/* dist/real-to-ai/
 
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4