name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ═══════════════════════════════════════════════════════════════
      # dice-verse
      # ═══════════════════════════════════════════════════════════════
      - name: Cache dice-verse node_modules
        id: nm-dice-verse
        uses: actions/cache@v4
        with:
          path: apps/dice-verse/node_modules
          key: dice-verse-nm-${{ hashFiles('apps/dice-verse/package-lock.json') }}

      - name: Cache dice-verse dist
        id: dist-dice-verse
        uses: actions/cache@v4
        with:
          path: apps/dice-verse/dist
          key: dice-verse-dist-${{ hashFiles('apps/dice-verse/src/**', 'apps/dice-verse/public/**', 'apps/dice-verse/index.html', 'apps/dice-verse/vite.config.*', 'apps/dice-verse/tsconfig*.json', 'apps/dice-verse/package-lock.json') }}

      - name: Build dice-verse
        if: steps.dist-dice-verse.outputs.cache-hit != 'true'
        continue-on-error: true
        env:
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_LLM_API_URL: ${{ secrets.VITE_LLM_API_URL }}
          VITE_LLM_MODEL: ${{ secrets.VITE_LLM_MODEL }}
        run: |
          cd apps/dice-verse
          if [ "${{ steps.nm-dice-verse.outputs.cache-hit }}" = "true" ]; then
            npm run build
          else
            npm ci && npm run build
          fi

      # ═══════════════════════════════════════════════════════════════
      # spin-art
      # ═══════════════════════════════════════════════════════════════
      - name: Cache spin-art node_modules
        id: nm-spin-art
        uses: actions/cache@v4
        with:
          path: apps/spin-art/node_modules
          key: spin-art-nm-${{ hashFiles('apps/spin-art/package-lock.json') }}

      - name: Cache spin-art dist
        id: dist-spin-art
        uses: actions/cache@v4
        with:
          path: apps/spin-art/dist
          key: spin-art-dist-${{ hashFiles('apps/spin-art/src/**', 'apps/spin-art/public/**', 'apps/spin-art/index.html', 'apps/spin-art/vite.config.*', 'apps/spin-art/tsconfig*.json', 'apps/spin-art/package-lock.json') }}

      - name: Build spin-art
        if: steps.dist-spin-art.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          cd apps/spin-art
          if [ "${{ steps.nm-spin-art.outputs.cache-hit }}" = "true" ]; then
            npm run build
          else
            npm ci && npm run build
          fi

