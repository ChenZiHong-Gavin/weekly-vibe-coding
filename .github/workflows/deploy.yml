        id: nm-vim-chaser
        uses: actions/cache@v4
        with:
          path: apps/vim-chaser/node_modules
          key: vim-chaser-nm-${{ hashFiles('apps/vim-chaser/package-lock.json') }}

      - name: Cache vim-chaser dist
        id: dist-vim-chaser
        uses: actions/cache@v4
        with:
          path: apps/vim-chaser/dist
          key: vim-chaser-dist-${{ hashFiles('apps/vim-chaser/src/**', 'apps/vim-chaser/public/**', 'apps/vim-chaser/index.html', 'apps/vim-chaser/vite.config.*', 'apps/vim-chaser/tsconfig*.json', 'apps/vim-chaser/package-lock.json') }}

      - name: Build vim-chaser
        if: steps.dist-vim-chaser.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          cd apps/vim-chaser
