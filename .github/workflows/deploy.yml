      # real-to-ai
      # ═══════════════════════════════════════════════════════════════
      - name: Cache real-to-ai node_modules
        id: nm-real-to-ai
        uses: actions/cache@v4
        with:
          path: apps/real-to-ai/node_modules
          key: real-to-ai-nm-${{ hashFiles('apps/real-to-ai/package-lock.json') }}

      - name: Cache real-to-ai dist
        id: dist-real-to-ai
        uses: actions/cache@v4
        with:
          path: apps/real-to-ai/dist
          key: real-to-ai-dist-${{ hashFiles('apps/real-to-ai/src/**', 'apps/real-to-ai/public/**', 'apps/real-to-ai/index.html', 'apps/real-to-ai/vite.config.*', 'apps/real-to-ai/tsconfig*.json', 'apps/real-to-ai/package-lock.json') }}

